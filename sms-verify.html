<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Vérification SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Vérification SMS</h1>
            <p style="color:var(--txt2); margin-bottom:1.5rem;">Un code à 6 chiffres vous a été envoyé par SMS.</p>
            <form id="verify-form">
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <input type="text" id="code" maxlength="6" pattern="\d{6}" class="form-input" required style="text-align:center; font-size:18px; letter-spacing:2px;">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Vérifier</button>
            </form>
            <div style="text-align:center; margin-top:1.5rem;">
                <a href="login.html" style="color:var(--amber);">← Retour</a>
            </div>
        </div>
    </div>

    <script>
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const phone = urlParams.get('phone');
            if (!phone) {
                showNotification('Numéro de téléphone manquant', 'error');
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('verify-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const code = document.getElementById('code').value;

                try {
                    const { error } = await supabaseClient.auth.verifyOtp({
                        phone,
                        token: code,
                        type: 'sms'
                    });
                    if (error) throw error;

                    // Vérifier si l'utilisateur a la MFA activée (optionnel)
                    const { data: factors } = await supabaseClient.auth.mfa.listFactors();
                    if (factors.totp && factors.totp.length > 0) {
                        window.location.href = 'mfa-verify.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } catch (err) {
                    showNotification('Erreur : ' + err.message, 'error');
                }
            });
        })();
    </script>
</body>
</html>
