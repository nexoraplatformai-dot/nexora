<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Pas besoin de dashboard.css sur la page d'inscription -->
    
    <!-- Ordre des scripts : d'abord Supabase, puis config, puis auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <!-- Pas besoin de dashboard.js ici -->
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Authentification à deux facteurs</h1>
            <p style="color:var(--txt2); font-size:14px; margin-bottom:2rem;">
                Entrez le code à 6 chiffres généré par votre application (Google Authenticator, Authy...).
            </p>

            <form id="verify-form">
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <input type="text" id="code" maxlength="6" pattern="\d{6}" class="form-input" required style="text-align:center; font-size:18px; letter-spacing:2px;">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Vérifier</button>
            </form>

            <div style="text-align:center; margin-top:1.5rem;">
                <a href="login.html" style="color:var(--amber); font-size:13px;">← Retour</a>
            </div>
        </div>

        <p style="text-align:center; font-size:12px; color:var(--txt2); margin-top:2rem;">© 2026 nexora.platform.ai</p>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
  // Initialisation directe
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let factors = [];

  async function getFactors() {
    try {
      const { data, error } = await supabaseClient.auth.mfa.listFactors();
      if (error) throw error;
      factors = data.totp;
      if (factors.length === 0) {
        alert('Aucun facteur MFA trouvé. Redirection vers configuration.');
        window.location.href = 'mfa-setup.html';
      }
    } catch (err) {
      console.error('Erreur getFactors:', err);
      alert('Erreur lors de la récupération des facteurs MFA : ' + err.message);
    }
  }

  getFactors();

  document.getElementById('verify-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = document.getElementById('code').value;

    if (factors.length === 0) return;
    const factorId = factors[0].id;

    try {
      const { data: challengeData, error: challengeError } = await supabaseClient.auth.mfa.challenge({ factorId });
      if (challengeError) throw challengeError;

      const { error: verifyError } = await supabaseClient.auth.mfa.verify({
        factorId,
        challengeId: challengeData.id,
        code
      });
      if (verifyError) throw verifyError;

      window.location.href = 'dashboard.html';
    } catch (err) {
      alert('Code invalide : ' + err.message);
    }
  });
</script>
</body>
</html>
