<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Vérification 2FA</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Authentification à deux facteurs</h1>
            <p style="color:var(--txt2); margin-bottom:2rem;">Entrez le code à 6 chiffres généré par votre application ou reçu par SMS/email.</p>

            <!-- Options de méthode (à adapter selon la configuration de l'utilisateur) -->
            <div style="margin-bottom:1rem;">
                <label for="method-select" class="form-label">Méthode</label>
                <select id="method-select" class="form-input">
                    <option value="totp">Google Authenticator (TOTP)</option>
                    <option value="sms">SMS</option>
                    <option value="email">Email</option>
                </select>
            </div>

            <!-- Zone pour TOTP -->
            <div id="totp-area">
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <input type="text" id="code" maxlength="6" pattern="\d{6}" class="form-input" required style="text-align:center; font-size:18px; letter-spacing:2px;">
                </div>
                <button id="verify-totp" class="btn btn-primary btn-block">Vérifier</button>
            </div>

            <!-- Zone pour SMS (apparaît si méthode SMS) -->
            <div id="sms-area" style="display:none;">
                <p style="color:var(--txt2);">Un code vous a été envoyé par SMS.</p>
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <input type="text" id="sms-code" maxlength="6" pattern="\d{6}" class="form-input" required style="text-align:center;">
                </div>
                <button id="verify-sms" class="btn btn-primary btn-block">Vérifier</button>
                <p style="margin-top:0.5rem;"><a href="#" id="resend-sms" style="color:var(--amber);">Renvoyer le code</a></p>
            </div>

            <!-- Zone pour Email (apparaît si méthode email) -->
            <div id="email-area" style="display:none;">
                <p style="color:var(--txt2);">Un code vous a été envoyé par email.</p>
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <input type="text" id="email-code" maxlength="6" pattern="\d{6}" class="form-input" required style="text-align:center;">
                </div>
                <button id="verify-email" class="btn btn-primary btn-block">Vérifier</button>
                <p style="margin-top:0.5rem;"><a href="#" id="resend-email" style="color:var(--amber);">Renvoyer le code</a></p>
            </div>

            <div style="text-align:center; margin-top:1.5rem;">
                <a href="login.html" style="color:var(--amber);">← Retour</a>
            </div>
        </div>

        <div id="notification-container" style="position:fixed; top:20px; right:20px; z-index:1000;"></div>
    </div>

    <script>
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        (async function() {
            const methodSelect = document.getElementById('method-select');
            const totpArea = document.getElementById('totp-area');
            const smsArea = document.getElementById('sms-area');
            const emailArea = document.getElementById('email-area');

            // Changer de méthode
            methodSelect.addEventListener('change', (e) => {
                const method = e.target.value;
                totpArea.style.display = method === 'totp' ? 'block' : 'none';
                smsArea.style.display = method === 'sms' ? 'block' : 'none';
                emailArea.style.display = method === 'email' ? 'block' : 'none';
            });

            // Récupérer l'utilisateur (pour les méthodes SMS/email)
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            const userEmail = user?.email;
            const userPhone = user?.user_metadata?.phone; // à stocker lors de l'inscription

            // Vérification TOTP
            document.getElementById('verify-totp').addEventListener('click', async () => {
                const code = document.getElementById('code').value;
                // Récupérer les facteurs MFA
                const { data: factors } = await listFactors();
                const totpFactor = factors.totp?.[0];
                if (!totpFactor) {
                    showNotification('Aucun facteur TOTP configuré', 'error');
                    return;
                }
                try {
                    const { data: challengeData, error: challengeError } = await window.supabaseClient.auth.mfa.challenge({ factorId: totpFactor.id });
                    if (challengeError) throw challengeError;
                    const { error: verifyError } = await window.supabaseClient.auth.mfa.verify({
                        factorId: totpFactor.id,
                        challengeId: challengeData.id,
                        code
                    });
                    if (verifyError) throw verifyError;
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    showNotification('Code invalide : ' + err.message, 'error');
                }
            });

            // Envoyer un code SMS (si besoin)
            async function sendSmsCode() {
                if (!userPhone) {
                    showNotification('Aucun numéro de téléphone enregistré', 'error');
                    return;
                }
                try {
                    const response = await fetch('/api/auth?action=send-sms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.id, phone: userPhone })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error);
                    showNotification('Code SMS envoyé', 'success');
                } catch (err) {
                    showNotification('Erreur : ' + err.message, 'error');
                }
            }

            document.getElementById('resend-sms').addEventListener('click', (e) => {
                e.preventDefault();
                sendSmsCode();
            });

            document.getElementById('verify-sms').addEventListener('click', async () => {
                const code = document.getElementById('sms-code').value;
                try {
                    const response = await fetch('/api/auth?action=verify-sms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.id, code })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error);
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    showNotification('Erreur : ' + err.message, 'error');
                }
            });

            // Email
            async function sendEmailCode() {
                try {
                    const response = await fetch('/api/auth?action=send-email-code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: userEmail })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error);
                    showNotification('Code email envoyé', 'success');
                } catch (err) {
                    showNotification('Erreur : ' + err.message, 'error');
                }
            }

            document.getElementById('resend-email').addEventListener('click', (e) => {
                e.preventDefault();
                sendEmailCode();
            });

            document.getElementById('verify-email').addEventListener('click', async () => {
                const code = document.getElementById('email-code').value;
                try {
                    const response = await fetch('/api/auth?action=verify-email-code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: userEmail, code })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error);
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    showNotification('Erreur : ' + err.message, 'error');
                }
            });

            // Optionnel : pré-sélectionner la méthode en fonction de ce qui est configuré
            // (si l'utilisateur a un facteur TOTP, on peut le mettre par défaut)
            const { data: factors } = await listFactors();
            if (factors.totp?.length > 0) {
                methodSelect.value = 'totp';
                totpArea.style.display = 'block';
                smsArea.style.display = 'none';
                emailArea.style.display = 'none';
            } else if (userPhone) {
                // Si pas de TOTP mais un téléphone, on peut proposer SMS
                methodSelect.value = 'sms';
                totpArea.style.display = 'none';
                smsArea.style.display = 'block';
                emailArea.style.display = 'none';
                // Envoyer automatiquement un code ?
                sendSmsCode();
            } else if (userEmail) {
                methodSelect.value = 'email';
                totpArea.style.display = 'none';
                smsArea.style.display = 'none';
                emailArea.style.display = 'block';
                sendEmailCode();
            }
        })();
    </script>
</body>
</html>
