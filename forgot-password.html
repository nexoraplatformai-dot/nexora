<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Pas besoin de dashboard.css sur la page d'inscription -->
    
    <!-- Ordre des scripts : d'abord Supabase, puis config, puis auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <!-- Pas besoin de dashboard.js ici -->
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
<nav style="background: transparent; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;">
    <a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
        <div style="width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center;">⚡</div>
        <span style="font-weight:800; color:var(--txt);">NEXORA</span>
    </a>
    <span style="flex:1;"></span>
    <a href="index.html" style="color:var(--txt2); text-decoration: none;">Accueil</a>
</nav>
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Mot de passe oublié</h1>
            <p style="color:var(--txt2); font-size:14px; margin-bottom:2rem;">
                Saisissez votre email, nous vous enverrons un lien pour réinitialiser votre mot de passe.
            </p>

            <form id="forgot-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="vous@exemple.fr">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Envoyer le lien</button>
            </form>

            <div style="text-align:center; margin-top:1.5rem;">
                <a href="login.html" style="color:var(--amber); font-size:13px;">← Retour à la connexion</a>
            </div>
        </div>

        <p style="text-align:center; font-size:12px; color:var(--txt2); margin-top:2rem;">© 2026 nexora.platform.ai</p>
    </div>

    <script>
	function showNotification(message, type = 'success') {
    const container = document.getElementById('notification-container');
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.textContent = message;
    container.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });
                if (error) throw error;

                alert('Un email de réinitialisation a été envoyé. Vérifiez votre boîte.');
                window.location.href = 'verify-email.html?email=' + encodeURIComponent(email);
            } catch (err) {
                alert('Erreur : ' + err.message);
            }
        });
    </script>
	<div id="notification-container" style="position:fixed; top:20px; right:20px; z-index:1000;"></div>
</body>
</html>
