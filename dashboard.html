<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Tableau de bord</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Scripts : toujours dans cet ordre -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh;">
    <!-- Navigation -->
    <nav>...</nav>

    <main>
        <!-- Contenu -->
        <button id="new-workflow-btn" class="btn btn-primary">➕ Nouveau workflow</button>
    </main>

    <script>
        (async function() {
            try {
                const { data: { user }, error } = await window.supabaseClient.auth.getUser();
                if (error || !user) {
                    window.location.href = 'login.html';
                    return;
                }
                const { data: factors } = await window.supabaseClient.auth.mfa.listFactors();
                if (!factors.totp || factors.totp.length === 0) {
                    window.location.href = 'mfa-setup.html';
                    return;
                }
                // Charger stats...
            } catch (err) { console.error(err); }
        })();

        document.getElementById('logout')?.addEventListener('click', async () => {
            await window.supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });

        document.getElementById('new-workflow-btn')?.addEventListener('click', () => {
            window.location.href = 'workflow-edit.html';
        });
    </script>
</body>
</html>
