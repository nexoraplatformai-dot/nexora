<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Tableau de bord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">NEXORA</h1>
            <button id="logout" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">Déconnexion</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h2 class="text-2xl font-bold mb-6">Bienvenue sur votre tableau de bord</h2>
        <p class="text-gray-600">Cette zone est protégée et accessible uniquement après authentification complète (MFA validée).</p>
        
        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h3 class="text-lg font-semibold mb-2">📊 Statistiques</h3>
                <p class="text-3xl font-bold text-blue-600">0</p>
                <p class="text-gray-500">workflows actifs</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h3 class="text-lg font-semibold mb-2">⏱️ Temps économisé</h3>
                <p class="text-3xl font-bold text-blue-600">0h</p>
                <p class="text-gray-500">cette semaine</p>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm">
            <h3 class="text-lg font-semibold mb-4">Commencer par créer votre premier workflow</h3>
            <a href="#" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Créer un workflow</a>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://sqzovftrdjcjpahpifnx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Pvcew-turPW9IoFTJajAwA_YbAlWc11';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Vérifier que l'utilisateur est authentifié
        supabaseClient.auth.getUser().then(({ data: { user }, error }) => {
            if (error || !user) {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logout').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
