<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Configuration 2FA</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Sécurisez votre compte</h1>
            <p style="color:var(--txt2); font-size:14px; margin-bottom:2rem;">
                Scannez ce QR code avec Google Authenticator ou Authy, puis entrez le code à 6 chiffres.
            </p>

            <div style="display:flex; justify-content:center; margin-bottom:2rem;">
                <div id="qrcode" style="background:white; padding:0.5rem; border-radius:12px;">
                    <p style="color:var(--midnight);">Génération...</p>
                </div>
            </div>

            <!-- Lien manuel de secours -->
            <div id="manual-uri" style="display:none; margin-bottom:1.5rem; text-align:center;">
                <p style="font-size:12px; color:var(--txt2); margin-bottom:0.5rem;">Si le QR code ne fonctionne pas :</p>
                <a id="uri-link" href="#" target="_blank" style="color:var(--amber); font-size:11px; word-break:break-all;"></a>
            </div>

            <form id="mfa-form">
                <div class="form-group">
                    <label class="form-label">Code à 6 chiffres</label>
                    <input type="text" id="code" maxlength="6" pattern="\d{6}" class="form-input" required style="text-align:center; font-size:18px; letter-spacing:2px;">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Activer la 2FA</button>
            </form>
        </div>

        <p style="text-align:center; font-size:12px; color:var(--txt2); margin-top:2rem;">© 2026 nexora.platform.ai</p>
    </div>

    <script>
        // supabaseClient vient de auth.js, pas besoin de le recréer
        let factorId = null;

        async function setupMFA() {
            try {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (userError || !user) {
                    alert('Vous devez être connecté.');
                    window.location.href = 'login.html';
                    return;
                }

                const { data, error } = await supabaseClient.auth.mfa.enroll({ factorType: 'totp' });
                if (error) throw error;

                factorId = data.id;
                const uri = data.totp.uri;

                // Afficher le lien manuel
                document.getElementById('manual-uri').style.display = 'block';
                document.getElementById('uri-link').href = uri;
                document.getElementById('uri-link').textContent = uri;

                // Générer QR code
                const qr = qrcode(0, 'M');
                qr.addData(uri);
                qr.make();
                document.getElementById('qrcode').innerHTML = qr.createSvgTag({ cellSize: 8, margin: 0 });
            } catch (err) {
                document.getElementById('qrcode').innerHTML = '<p style="color:red;">Erreur : ' + err.message + '</p>';
            }
        }

        setupMFA();

        document.getElementById('mfa-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value;

            if (!factorId) {
                alert('Configuration en cours, veuillez patienter...');
                return;
            }

            try {
                const { error } = await supabaseClient.auth.mfa.challengeAndVerify({ factorId, code });
                if (error) throw error;

                alert('MFA activée avec succès !');
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert('Code invalide : ' + err.message);
            }
        });
    </script>
</body>
</html>
