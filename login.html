<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Connexion à NEXORA</h1>
        <form id="login-form">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2" for="email">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2" for="password">Mot de passe</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Se connecter</button>
        </form>
        <p class="mt-4 text-center text-gray-600">Pas encore de compte ? <a href="signup.html" class="text-blue-600 hover:underline">S'inscrire</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://sqzovftrdjcjpahpifnx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Pvcew-turPW9IoFTJajAwA_YbAlWc11';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;

                const { data: factors, error: mfaError } = await supabaseClient.auth.mfa.listFactors();
                if (mfaError) throw mfaError;

                const hasMfa = factors.totp && factors.totp.length > 0;
                if (!hasMfa) {
                    alert('Vous devez configurer l\'authentification à deux facteurs.');
                    window.location.href = 'mfa-setup.html';
                } else {
                    window.location.href = 'mfa-verify.html';
                }
            } catch (err) {
                alert('Erreur : ' + err.message);
            }
        });
    </script>
</body>
</html>
