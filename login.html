<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Ordre strict -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Connexion</h1>
            <p style="color:var(--txt2); font-size:14px; margin-bottom:2rem;">Accédez à votre espace sécurisé.</p>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="vous@exemple.fr">
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>
                <div style="text-align:right; margin-bottom:1.5rem;">
                    <a href="forgot-password.html" style="color:var(--amber); font-size:13px;">Mot de passe oublié ?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="padding:14px;">Se connecter</button>
            </form>

            <div style="position:relative; margin:1.5rem 0;">
                <div style="border-top:1px solid var(--border);"></div>
                <span style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card); padding:0 10px; font-size:12px; color:var(--txt2);">ou</span>
            </div>

            <button class="btn btn-secondary btn-block" style="justify-content:center; gap:10px; margin-bottom:1rem;">
                <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continuer avec Google
            </button>

            <p style="text-align:center; font-size:13px; color:var(--txt2);">
                Pas encore de compte ? 
                <a href="signup.html" style="color:var(--amber); font-weight:700;">S'inscrire gratuitement</a>
            </p>
        </div>

        <p style="text-align:center; font-size:12px; color:var(--txt2); margin-top:2rem;">© 2026 nexora.platform.ai</p>
    </div>

<script>
function showNotification(message, type = 'success') {
    const container = document.getElementById('notification-container');
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.textContent = message;
    container.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}
    // Fonction d'initialisation exécutée après chargement complet
    function initLogin() {
        const loginForm = document.getElementById('login-form');
        if (!loginForm) {
            console.error('❌ Formulaire de connexion introuvable ! Vérifiez que l\'ID "login-form" est présent.');
            return;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await signIn(email, password);
                if (error) throw error;

                const factors = await listFactors();
                const hasMfa = factors.data?.totp?.length > 0;
                if (!hasMfa) {
                    alert('Vous devez configurer l\'authentification à deux facteurs.');
                    window.location.href = 'mfa-setup.html';
                } else {
                    window.location.href = 'mfa-verify.html';
                }
            } catch (err) {
                alert('Erreur : ' + err.message);
            }
        });
    }

    // Attendre que le DOM soit prêt
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initLogin);
    } else {
        initLogin(); // DOM déjà chargé
    }
</script>
<div id="notification-container" style="position:fixed; top:20px; right:20px; z-index:1000;"></div>
</body>
</html>
