<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Mon profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Ordre des scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh;">
    <!-- Navigation (identique au dashboard) -->
    <nav style="background: var(--surface); border-bottom:1px solid var(--border); padding:0 2rem;">
        <div style="max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px;">
            <a href="dashboard.html" style="display:flex; align-items:center; gap:8px;">
                <div style="width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center;">⚡</div>
                <span style="font-weight:800;">NEXORA</span>
            </a>
            <div style="display:flex; align-items:center; gap:1rem;">
                <span style="color:var(--txt2);">👤 Profil</span>
                <button id="logout" class="btn btn-secondary" style="padding:6px 12px;">Déconnexion</button>
            </div>
        </div>
    </nav>

    <main style="max-width:800px; margin:2rem auto; padding:0 2rem;">
        <h1 style="font-size:2rem; font-weight:800; margin-bottom:2rem;">Mon profil</h1>

        <div style="display:grid; gap:2rem;">
            <!-- Informations personnelles -->
            <div class="glass-card" style="padding:2rem;">
                <h2 style="font-size:1.2rem; font-weight:700; margin-bottom:1.5rem;">Informations générales</h2>
                <div id="user-info">
                    <p>Chargement...</p>
                </div>
            </div>

            <!-- Configuration MFA -->
            <div class="glass-card" style="padding:2rem;">
                <h2 style="font-size:1.2rem; font-weight:700; margin-bottom:1.5rem;">Sécurité à deux facteurs (2FA)</h2>
                <div id="mfa-status">
                    <p>Vérification...</p>
                </div>
                <div id="mfa-setup" style="display:none; margin-top:1.5rem;">
                    <p style="color:var(--txt2); margin-bottom:1rem;">Scannez ce QR code avec Google Authenticator :</p>
                    <div style="display:flex; justify-content:center; margin-bottom:1rem;">
                        <div id="qrcode" style="background:white; padding:0.5rem; border-radius:12px;"></div>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <input type="text" id="mfa-code" placeholder="Code à 6 chiffres" class="form-input" style="text-align:center;">
                    </div>
                    <button id="verify-mfa" class="btn btn-primary">Activer la 2FA</button>
                </div>
            </div>

            <!-- Gestion des données (RGPD) -->
            <div class="glass-card" style="padding:2rem;">
                <h2 style="font-size:1.2rem; font-weight:700; margin-bottom:1rem;">Gestion des données</h2>
                <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                    <button id="export-data" class="btn btn-secondary">📥 Exporter mes données</button>
                    <button id="delete-account" class="btn btn-secondary" style="border-color:#EF4444; color:#EF4444;">🗑️ Supprimer mon compte</button>
                </div>
            </div>
        </div>
    </main>

    <script>
	function showNotification(message, type = 'success') {
    const container = document.getElementById('notification-container');
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.textContent = message;
    container.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}
        (async function() {
            // Vérifier la session (supabaseClient est global)
            const { data: { user }, error } = await window.supabaseClient.auth.getUser();
            if (error || !user) {
                window.location.href = 'login.html';
                return;
            }

            // Vérifier MFA (optionnel, mais on garde pour la cohérence)
            const { data: factors } = await window.supabaseClient.auth.mfa.listFactors();
            const hasMfa = factors.totp && factors.totp.length > 0;

            // Afficher les infos utilisateur
            document.getElementById('user-info').innerHTML = `
                <p><strong>Email :</strong> ${user.email}</p>
                <p><strong>ID :</strong> ${user.id}</p>
                <p><strong>Dernière connexion :</strong> ${new Date(user.last_sign_in_at).toLocaleString()}</p>
            `;

            // Gestion de l'affichage MFA
            const mfaStatusDiv = document.getElementById('mfa-status');
            const mfaSetupDiv = document.getElementById('mfa-setup');

            if (hasMfa) {
                mfaStatusDiv.innerHTML = `
                    <p style="color:#10B981;">✅ 2FA activée</p>
                    <button id="disable-mfa" class="btn btn-secondary" style="margin-top:1rem;">Désactiver la 2FA</button>
                `;
                document.getElementById('disable-mfa')?.addEventListener('click', async () => {
                    // Pour désactiver, il faudrait appeler une fonction de Supabase (non implémentée ici)
                    alert('Fonctionnalité de désactivation à implémenter côté serveur.');
                });
            } else {
                mfaStatusDiv.innerHTML = `
                    <p style="color:#F59E0B;">⚠️ 2FA non configurée</p>
                    <button id="start-mfa" class="btn btn-primary" style="margin-top:1rem;">Configurer la 2FA</button>
                `;
                document.getElementById('start-mfa')?.addEventListener('click', setupMFA);
            }

            // Fonction pour configurer la MFA
            let factorId = null;
            async function setupMFA() {
                mfaSetupDiv.style.display = 'block';
                try {
                    const { data, error } = await window.supabaseClient.auth.mfa.enroll({ factorType: 'totp' });
                    if (error) throw error;

                    factorId = data.id;
                    const uri = data.totp.uri;

                    const qr = qrcode(0, 'M');
                    qr.addData(uri);
                    qr.make();
                    document.getElementById('qrcode').innerHTML = qr.createSvgTag({ cellSize: 8, margin: 0 });
                } catch (err) {
                    alert('Erreur lors de la création de la 2FA : ' + err.message);
                }
            }

            // Vérification du code MFA
            document.getElementById('verify-mfa')?.addEventListener('click', async () => {
                const code = document.getElementById('mfa-code').value;
                if (!factorId || !code) return;

                try {
                    const { error } = await window.supabaseClient.auth.mfa.challengeAndVerify({ factorId, code });
                    if (error) throw error;

                    alert('2FA activée avec succès !');
                    location.reload(); // Recharger pour afficher le statut activé
                } catch (err) {
                    alert('Code invalide : ' + err.message);
                }
            });

            // Export des données (simulation)
            document.getElementById('export-data')?.addEventListener('click', () => {
                alert('Fonction d’export à implémenter (téléchargement JSON).');
            });

            // Suppression de compte (à faire avec précaution)
            document.getElementById('delete-account')?.addEventListener('click', async () => {
                if (confirm('Êtes-vous sûr de vouloir supprimer définitivement votre compte ? Cette action est irréversible.')) {
                    // Appel à une fonction d'administration (nécessite une fonction serverless avec la clé service)
                    alert('Fonction de suppression à implémenter côté serveur.');
                }
            });

            // Déconnexion
            document.getElementById('logout').addEventListener('click', async () => {
                await window.supabaseClient.auth.signOut();
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>
