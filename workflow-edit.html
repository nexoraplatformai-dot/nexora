<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Configuration du workflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Scripts dans l'ordre -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/workflows.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh;">
    <!-- Navigation -->
    <nav style="background: var(--surface); border-bottom:1px solid var(--border); padding:0 2rem;">
        <div style="max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px;">
            <a href="dashboard.html" style="display:flex; align-items:center; gap:8px;">
                <div style="width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center;">⚡</div>
                <span style="font-weight:800;">NEXORA</span>
            </a>
            <div style="display:flex; align-items:center; gap:1rem;">
                <a href="profile.html" style="color:var(--txt2);">👤 Profil</a>
                <button id="logout" class="btn btn-secondary" style="padding:6px 12px;">Déconnexion</button>
            </div>
        </div>
    </nav>

   <main style="max-width:800px; margin:2rem auto; padding:0 2rem;">
    <div style="margin-bottom:2rem;">
        <a href="workflows.html" style="color:var(--amber); display:inline-flex; align-items:center; gap:0.5rem;">← Retour aux workflows</a>
        <h1 style="margin-top:1rem;">Configurer un workflow</h1>
        <p style="color:var(--txt2);">Choisissez votre secteur et un template pour commencer, puis personnalisez.</p>
    </div>

    <div class="glass-card" style="padding:2rem;">
        <form id="workflow-form">
            <!-- Sélecteur de secteur -->
            <div class="form-group">
                <label class="form-label">Secteur d'activité</label>
                <select id="workflow-sector" class="form-input" required>
                    <option value="">Choisissez votre secteur</option>
                    <option value="immobilier">Immobilier</option>
                    <option value="juridique">Juridique (Avocats / Huissiers)</option>
                    <option value="business">Business Developer</option>
                    <option value="tpe">TPE / PME</option>
                </select>
            </div>

            <!-- Sélecteur de template (dynamique) -->
            <div class="form-group">
                <label class="form-label">Template prédéfini</label>
                <select id="workflow-template" class="form-input">
                    <option value="">Choisissez d'abord un secteur</option>
                </select>
                <p class="form-help">Sélectionnez un template pour pré-remplir la configuration.</p>
            </div>

            <!-- Nom du workflow -->
            <div class="form-group">
                <label class="form-label">Nom du workflow</label>
                <input type="text" id="workflow-name" class="form-input" required placeholder="ex: Rappels de visites immobilières">
            </div>

            <!-- ... le reste du formulaire inchangé ... -->
        </form>
    </div>
</main>

  <script>
    function showNotification(message, type = 'success') {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.textContent = message;
        container.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    (async function() {
        // Vérification utilisateur et MFA
        const { user, error } = await getCurrentUser();
        if (error || !user) {
            window.location.href = 'login.html';
            return;
        }
        const factors = await listFactors();
        if (!factors.data?.totp?.length) {
            window.location.href = 'mfa-setup.html';
            return;
        }

        // Références aux éléments
        const sectorSelect = document.getElementById('workflow-sector');
        const templateSelect = document.getElementById('workflow-template');
        const workflowTypeInput = document.getElementById('workflow-type');

        // --- Chargement des templates selon secteur ---
        async function loadTemplates(sector) {
            if (!sector) {
                templateSelect.innerHTML = '<option value="">Sélectionnez d’abord un secteur</option>';
                return;
            }
            try {
                const { data, error } = await window.supabaseClient
                    .from('workflow_templates')
                    .select('id, name, description, config, type')
                    .eq('sector', sector);
                if (error) throw error;
                templateSelect.innerHTML = '<option value="">Choisissez un template</option>';
                data.forEach(t => {
                    // On stocke la config et le type dans des attributs data
                    templateSelect.innerHTML += `<option value="${t.id}" data-config='${JSON.stringify(t.config).replace(/'/g, "&#39;")}' data-type="${t.type}">${t.name}</option>`;
                });
            } catch (err) {
                console.error('Erreur chargement templates:', err);
                showNotification('Erreur chargement templates', 'error');
            }
        }

        sectorSelect.addEventListener('change', (e) => {
            loadTemplates(e.target.value);
        });

        // --- Pré-remplissage du formulaire lors du choix d'un template ---
        templateSelect.addEventListener('change', (e) => {
            const selected = e.target.selectedOptions[0];
            if (!selected || !selected.value) return;
            const config = JSON.parse(selected.dataset.config);
            const type = selected.dataset.type;

            // Mettre à jour le type caché
            workflowTypeInput.value = type;

            // Réinitialiser les champs (optionnel)
            // On pré-remplit selon le type
            if (type === 'rappel_rdv') {
                if (config.keywords) {
                    document.getElementById('keywords').value = config.keywords.join(', ');
                }
                if (config.channels) {
                    document.getElementById('channel-sms').checked = config.channels.includes('sms');
                    document.getElementById('channel-email').checked = config.channels.includes('email');
                }
                if (config.messages) {
                    if (config.messages.j1?.sms) {
                        document.getElementById('message-j1-sms').value = config.messages.j1.sms;
                    }
                    if (config.messages.j1?.email) {
                        document.getElementById('message-j1-email').value = config.messages.j1.email;
                    }
                    if (config.messages.h2?.sms) {
                        document.getElementById('message-h2-sms').value = config.messages.h2.sms;
                    }
                }
            }
            // Ajouter d'autres types ici (qualification_lead, etc.)
        });

        // --- Vérification connexion Google ---
        async function checkGoogleConnection() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('user_tokens')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('provider', 'google')
                    .maybeSingle();

                if (error) throw error;
                const statusEl = document.getElementById('google-status');
                if (data) {
                    statusEl.innerHTML = '✅ Connecté';
                    statusEl.style.color = 'var(--teal)';
                } else {
                    statusEl.innerHTML = '❌ Non connecté';
                    statusEl.style.color = 'var(--txt2)';
                }
            } catch (err) {
                console.error('Erreur vérification Google:', err);
                document.getElementById('google-status').innerHTML = '❌ Erreur';
            }
        }
        await checkGoogleConnection();

        // --- Gestion du retour OAuth Google ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === 'google_connected') {
            showNotification('Connexion Google réussie !', 'success');
            await checkGoogleConnection();
        }
        if (urlParams.get('error') === 'invalid_grant') {
            showNotification('Erreur lors de la connexion Google. Veuillez réessayer.', 'error');
        }

        // --- Bouton de connexion Google ---
        document.getElementById('connect-google').addEventListener('click', async () => {
            const { user } = await getCurrentUser();
            if (!user) {
                showNotification('Vous devez être connecté.', 'error');
                return;
            }
            const state = btoa(JSON.stringify({ userId: user.id }));
            window.location.href = `/api/auth-google?state=${encodeURIComponent(state)}`;
        });

        // --- Si édition d'un workflow existant ---
        const workflowId = urlParams.get('id');
        if (workflowId) {
            // À implémenter : charger le workflow et pré-remplir les champs
            // (cela nécessite de récupérer le workflow et de remplir le secteur, template, etc.)
            // Pour l'instant, on ignore.
        }

        // --- Soumission du formulaire ---
        document.getElementById('workflow-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('workflow-name').value;
            const sector = sectorSelect.value;
            const templateId = templateSelect.value;
            const type = workflowTypeInput.value;

            if (!sector) {
                showNotification('Veuillez sélectionner un secteur', 'error');
                return;
            }

            // Construction de la config selon le type
            let config = {};
            if (type === 'rappel_rdv') {
                const keywords = document.getElementById('keywords').value.split(',').map(k => k.trim());
                const channels = [];
                if (document.getElementById('channel-sms').checked) channels.push('sms');
                if (document.getElementById('channel-email').checked) channels.push('email');
                const messageJ1Sms = document.getElementById('message-j1-sms').value;
                const messageJ1Email = document.getElementById('message-j1-email').value;
                const messageH2Sms = document.getElementById('message-h2-sms').value;

                config = {
                    keywords,
                    channels,
                    messages: {
                        j1: { sms: messageJ1Sms, email: messageJ1Email },
                        h2: { sms: messageH2Sms }
                    }
                };
            }
            // Ajouter d'autres types de workflows ici

            const active = document.getElementById('active').checked;

            try {
                let result;
                if (workflowId) {
                    result = await updateWorkflow(workflowId, {
                        name,
                        type,
                        sector,
                        template_id: templateId || null,
                        config,
                        active
                    });
                } else {
                    result = await createWorkflow({
                        user_id: user.id,
                        name,
                        type,
                        sector,
                        template_id: templateId || null,
                        config,
                        active
                    });
                }
                if (result.error) throw result.error;
                showNotification('Workflow enregistré avec succès !', 'success');
                setTimeout(() => window.location.href = 'workflows.html', 1500);
            } catch (err) {
                showNotification('Erreur : ' + err.message, 'error');
            }
        });

        // --- Déconnexion ---
        document.getElementById('logout').addEventListener('click', async () => {
            await signOut();
        });
    })();
</script>
</body>
</html>
