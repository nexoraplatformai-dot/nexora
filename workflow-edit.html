<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Configuration du workflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Scripts dans l'ordre -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/workflows.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh;">
    <!-- Navigation -->
    <nav style="background: var(--surface); border-bottom:1px solid var(--border); padding:0 2rem;">
        <div style="max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px;">
            <a href="dashboard.html" style="display:flex; align-items:center; gap:8px;">
                <div style="width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center;">⚡</div>
                <span style="font-weight:800;">NEXORA</span>
            </a>
            <div style="display:flex; align-items:center; gap:1rem;">
                <a href="profile.html" style="color:var(--txt2);">👤 Profil</a>
                <button id="logout" class="btn btn-secondary" style="padding:6px 12px;">Déconnexion</button>
            </div>
        </div>
    </nav>

    <main style="max-width:800px; margin:2rem auto; padding:0 2rem;">
        <div style="margin-bottom:2rem;">
            <a href="workflows.html" style="color:var(--amber); display:inline-flex; align-items:center; gap:0.5rem;">← Retour aux workflows</a>
            <h1 style="margin-top:1rem;">Configurer un workflow de rappels</h1>
            <p style="color:var(--txt2);">Automatisez les rappels de rendez-vous depuis votre agenda Google.</p>
        </div>

        <div class="glass-card" style="padding:2rem;">
            <form id="workflow-form">
                <!-- Nom -->
                <div class="form-group">
                    <label class="form-label">Nom du workflow</label>
                    <input type="text" id="workflow-name" class="form-input" required placeholder="ex: Rappels de visites immobilières">
                </div>

                <!-- Connexion Google avec indicateur d'état -->
                <div class="form-group">
                    <label class="form-label">Agenda Google</label>
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <span id="google-status" style="color:var(--txt2);">Non connecté</span>
                        <button type="button" id="connect-google" class="btn btn-secondary">Connecter mon agenda</button>
                    </div>
                </div>

                <!-- Mots-clés -->
                <div class="form-group">
                    <label class="form-label">Mots-clés (séparés par des virgules)</label>
                    <input type="text" id="keywords" class="form-input" placeholder="ex: visite, rendez-vous, audience" value="visite,rendez-vous">
                    <p class="form-help">Seuls les événements contenant ces mots seront pris en compte.</p>
                </div>

                <!-- Canaux de rappel -->
                <div class="form-group">
                    <label class="form-label">Canaux de rappel</label>
                    <div style="display:flex; gap:1.5rem;">
                        <label><input type="checkbox" id="channel-sms" value="sms" checked> SMS</label>
                        <label><input type="checkbox" id="channel-email" value="email" checked> Email</label>
                    </div>
                </div>

                <!-- Messages J-1 SMS -->
                <div class="form-group">
                    <label class="form-label">Message pour J-1 (SMS)</label>
                    <textarea id="message-j1-sms" class="form-input" rows="2">Bonjour {prenom}, rappel de votre rendez-vous demain à {heure}. Merci de confirmer par Oui ou Non.</textarea>
                </div>

                <!-- Messages J-1 Email -->
                <div class="form-group">
                    <label class="form-label">Message pour J-1 (Email)</label>
                    <textarea id="message-j1-email" class="form-input" rows="2">Bonjour {prenom},&lt;br&gt;Ceci est un rappel pour votre rendez-vous du {date} à {heure}. Veuillez confirmer votre présence.</textarea>
                </div>

                <!-- Messages H-2 SMS -->
                <div class="form-group">
                    <label class="form-label">Message pour H-2 (SMS)</label>
                    <textarea id="message-h2-sms" class="form-input" rows="2">Votre rendez-vous est dans 2 heures. À tout de suite !</textarea>
                </div>

                <!-- Variables disponibles -->
                <div class="form-help" style="background:var(--surface); padding:1rem; border-radius:8px; margin-bottom:1rem;">
                    <p><strong>Variables disponibles :</strong> {prenom}, {nom}, {date}, {heure}, {lieu}</p>
                </div>

                <!-- Activer immédiatement -->
                <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
                    <input type="checkbox" id="active" checked>
                    <label for="active">Activer le workflow immédiatement</label>
                </div>

                <!-- Boutons -->
                <div style="display:flex; gap:1rem; margin-top:2rem;">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="workflows.html" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        (async function() {
            // Vérification utilisateur et MFA
            const { user, error } = await getCurrentUser();
            if (error || !user) {
                window.location.href = 'login.html';
                return;
            }
            const factors = await listFactors();
            if (!factors.data?.totp?.length) {
                window.location.href = 'mfa-setup.html';
                return;
            }

            // Vérifier l'état de connexion Google
            async function checkGoogleConnection() {
                try {
                    const { data, error } = await window.supabaseClient
                        .from('user_tokens')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('provider', 'google')
                        .maybeSingle(); // retourne null si aucun résultat

                    if (error) throw error;
                    const statusEl = document.getElementById('google-status');
                    if (data) {
                        statusEl.innerHTML = '✅ Connecté';
                        statusEl.style.color = 'var(--teal)';
                    } else {
                        statusEl.innerHTML = '❌ Non connecté';
                        statusEl.style.color = 'var(--txt2)';
                    }
                } catch (err) {
                    console.error('Erreur vérification Google:', err);
                    document.getElementById('google-status').innerHTML = '❌ Erreur';
                }
            }
            await checkGoogleConnection();

            // Si retour de Google avec succès, on peut rafraîchir le statut
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('success') === 'google_connected') {
                // On pourrait afficher un message temporaire
                console.log('Connexion Google réussie !');
                await checkGoogleConnection(); // re-vérifier immédiatement
            }
            if (urlParams.get('error') === 'invalid_grant') {
                alert('Erreur lors de la connexion Google. Veuillez réessayer.');
            }

            // Bouton de connexion Google
            document.getElementById('connect-google').addEventListener('click', async () => {
                const { user } = await getCurrentUser();
                if (!user) {
                    alert('Vous devez être connecté.');
                    return;
                }
                const state = btoa(JSON.stringify({ userId: user.id }));
                window.location.href = `/api/auth-google?state=${encodeURIComponent(state)}`;
            });

            // Récupérer l'ID du workflow si édition
            const workflowId = urlParams.get('id');

            // Si édition, charger les données (à implémenter)
            if (workflowId) {
                // À faire : charger workflow via getWorkflows et pré-remplir
            }

            // Soumission du formulaire
            document.getElementById('workflow-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('workflow-name').value;
                const keywords = document.getElementById('keywords').value.split(',').map(k => k.trim());
                const channels = [];
                if (document.getElementById('channel-sms').checked) channels.push('sms');
                if (document.getElementById('channel-email').checked) channels.push('email');
                const messageJ1Sms = document.getElementById('message-j1-sms').value;
                const messageJ1Email = document.getElementById('message-j1-email').value;
                const messageH2Sms = document.getElementById('message-h2-sms').value;
                const active = document.getElementById('active').checked;

                const config = {
                    keywords,
                    channels,
                    messages: {
                        j1: { sms: messageJ1Sms, email: messageJ1Email },
                        h2: { sms: messageH2Sms }
                    }
                };

                try {
                    let result;
                    if (workflowId) {
                        result = await updateWorkflow(workflowId, { name, type: 'rappel_rdv', config, active });
                    } else {
                        result = await createWorkflow({
                            user_id: user.id,
                            name,
                            type: 'rappel_rdv',
                            config,
                            active
                        });
                    }
                    if (result.error) throw result.error;
                    alert('Workflow enregistré avec succès !');
                    window.location.href = 'workflows.html';
                } catch (err) {
                    alert('Erreur : ' + err.message);
                }
            });

            // Déconnexion
            document.getElementById('logout').addEventListener('click', async () => {
                await signOut();
            });
        })();
    </script>
</body>
</html>
