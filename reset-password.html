<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Pas besoin de dashboard.css sur la page d'inscription -->
    
    <!-- Ordre des scripts : d'abord Supabase, puis config, puis auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <!-- Pas besoin de dashboard.js ici -->
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Nouveau mot de passe</h1>
            <p style="color:var(--txt2); font-size:14px; margin-bottom:2rem;">
                Choisissez un nouveau mot de passe (minimum 6 caractères).
            </p>

            <form id="reset-form">
                <div class="form-group">
                    <label class="form-label">Nouveau mot de passe</label>
                    <input type="password" id="password" class="form-input" required minlength="6" placeholder="••••••">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" id="confirm" class="form-input" required minlength="6" placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Mettre à jour</button>
            </form>
        </div>

        <p style="text-align:center; font-size:12px; color:var(--txt2); margin-top:2rem;">© 2026 nexora.platform.ai</p>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialisation Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Vérifier que l'utilisateur a un token valide (via le lien de reset)
        supabase.auth.getSession().then(({ data: { session }, error }) => {
            if (error || !session) {
                alert('Session invalide ou expirée. Veuillez refaire une demande.');
                window.location.href = 'forgot-password.html';
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                alert('Les mots de passe ne correspondent pas.');
                return;
            }

            try {
                const { error } = await supabase.auth.updateUser({ password });
                if (error) throw error;

                alert('Mot de passe mis à jour avec succès !');
                window.location.href = 'login.html';
            } catch (err) {
                alert('Erreur : ' + err.message);
            }
        });
    </script>
</body>
</html>
