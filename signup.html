<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Créer un compte NEXORA</h1>
        <form id="signup-form">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2" for="email">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2" for="password">Mot de passe</label>
                <input type="password" id="password" required minlength="6" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
                <p class="text-sm text-gray-500 mt-1">Minimum 6 caractères</p>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">S'inscrire</button>
        </form>
        <p class="mt-4 text-center text-gray-600">Déjà un compte ? <a href="login.html" class="text-blue-600 hover:underline">Se connecter</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://sqzovftrdjcjpahpifnx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Pvcew-turPW9IoFTJajAwA_YbAlWc11';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;
                alert('Inscription réussie ! Veuillez configurer l\'authentification à deux facteurs.');
                window.location.href = 'mfa-setup.html';
            } catch (err) {
                alert('Erreur : ' + err.message);
            }
        });
    </script>
</body>
</html>
