<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA – Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body style="background: var(--midnight); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:100%; max-width:440px;">
        <!-- Logo -->
        <a href="index.html" style="display:inline-block; margin-bottom:2rem;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--amber),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px;">⚡</div>
                <span style="font-size:20px; font-weight:800; letter-spacing:-0.045em; color:var(--txt);">NEXORA</span>
            </div>
        </a>

        <!-- Signup Card -->
        <div class="glass-card" style="padding:2rem;">
            <h1 style="font-size:24px; font-weight:800; margin-bottom:0.5rem;">Créer un compte</h1>
            <p style="color:var(--txt2); font-size:14px; margin-bottom:2rem;">Commencez gratuitement, sans carte bancaire.</p>

            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label">Email professionnel</label>
                    <input type="email" id="email" class="form-input" required placeholder="vous@entreprise.fr">
                </div>

                <!-- Nouveau champ téléphone -->
                <div class="form-group">
                    <label class="form-label">Téléphone (optionnel, pour 2FA par SMS)</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+33612345678">
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="password" class="form-input" required minlength="6" placeholder="Minimum 6 caractères">
                </div>

                <!-- Case à cocher RGPD -->
                <div class="form-group" style="display:flex; gap:8px; align-items:flex-start;">
                    <input type="checkbox" id="rgpd" required style="margin-top:2px; accent-color:var(--amber);">
                    <label for="rgpd" style="font-size:12px; color:var(--txt2); line-height:1.6;">
                        J'accepte les <a href="#" style="color:var(--amber);">CGU</a> et la <a href="#" style="color:var(--amber);">Politique de confidentialité</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="padding:14px; margin-top:1rem;">Créer mon compte</button>
            </form>

            <div style="position:relative; margin:1.5rem 0;">
                <div style="border-top:1px solid var(--border);"></div>
                <span style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card); padding:0 10px; font-size:12px; color:var(--txt2);">ou</span>
            </div>

            <!-- Bouton Google -->
            <button class="btn btn-secondary btn-block" style="justify-content:center; gap:10px; margin-bottom:1rem;">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                S'inscrire avec Google
            </button>

            <p style="text-align:center; font-size:13px; color:var(--txt2);">
                Déjà un compte ? 
                <a href="login.html" style="color:var(--amber); font-weight:700;">Se connecter</a>
            </p>
        </div>

        <p style="text-align:center; font-size:12px; color:var(--txt2); margin-top:2rem;">© 2026 nexora.platform.ai</p>
    </div>

    <script>
        // Récupération des variables globales depuis config.js (SUPABASE_URL, SUPABASE_ANON_KEY)
        const supabase = window.supabaseClient; // défini dans auth.js

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;

            try {
                const { data, error } = await supabase.auth.signUp({ 
                    email, 
                    password,
                    options: {
                        data: {
                            phone: phone || null // stocker le téléphone dans les métadonnées utilisateur
                        },
                        emailRedirectTo: window.location.origin + '/verify-email.html'
                    }
                });
                if (error) throw error;

                alert('Inscription réussie ! Veuillez vérifier votre email pour confirmer votre compte.');
                window.location.href = 'verify-email.html?email=' + encodeURIComponent(email);
            } catch (err) {
                alert('Erreur : ' + err.message);
            }
        });
    </script>
</body>
</html>
